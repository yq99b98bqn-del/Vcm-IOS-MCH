name: Build IPA

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-latest

    steps:
      - uses: actions/checkout@v4

      - name: Build App
        run: |
          xcodebuild \
            -scheme Moblin \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Create IPA
        run: |
          mkdir Payload
          APP=$(find build -name "*.app" | head -n 1)
          cp -R "$APP" Payload/
          zip -r Moblin.ipa Payload

      - name: Upload IPA
        uses: actions/upload-artifact@v4
        with:
          name: Moblin-IPA
          path: Moblin.ipa
